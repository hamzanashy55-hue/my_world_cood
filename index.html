<!-- index.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Code World | Potter Master Vault</title>
    <link rel="stylesheet" href="style.css"> <!-- ربط ملف الاستايل -->
</head>
<body>

    <!-- شاشة الترحيب -->
    <div id="splash-screen">
        <div class="welcome-text">HELLO<br>ENG_POTTER</div>
    </div>

    <!-- الماوس السحري -->
    <div id="dot"></div>
    <div id="halo"></div>

    <!-- حاوية الخلفية -->
    <div id="bg-container"></div>

    <!-- واجهة الدخول -->
    <section id="login-screen">
        <div class="login-card">
            <div class="brand-logo">
                <h1>World_Code</h1>
                <p>Eng/Potter</p>
            </div>
            <input id="pw-input" type="password" placeholder="••••••••">
            <button class="btn-gold" onclick="validateIdentity()">Unlock</button>
        </div>
    </section>

    <!-- السيستم الداخلي (الخزنة) -->
    <main id="dashboard">
        <h1 class="vault-title">ACCESS GRANTED</h1>
        <p>Welcome back, Master Potter. Your vault is secure.</p>
        <button class="logout-btn" onclick="location.reload()">Security Logout</button>
    </main>

    <script src="script.js"></script> <!-- ربط ملف الجافا سكريبت -->
</body>
</html>
