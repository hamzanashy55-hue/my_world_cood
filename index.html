<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLib Vault | Nashy</title>
  <style>
    /* --- المتغيرات الأساسية --- */
    :root {
      --color-background-primary: #0d1117;
      --color-background-secondary: #161b22;
      --color-text-primary: #c9d1d9;
      --color-text-secondary: #8b949e;
      --color-border-primary: #30363d;
      --color-border-info: #388bfd;
      --color-background-info: rgba(56, 139, 253, 0.1);
      --primary-accent: #5865f2;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); line-height: 1.5; }

    /* --- شاشة الدخول الاحترافية (Nashy Style) --- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
      /* خلفية متدرجة متحركة */
      background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0d1117);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #login-card {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      width: 340px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .vault-icon { 
      width: 64px; height: 64px; border-radius: 16px; 
      background: var(--primary-accent); display: flex; 
      align-items: center; justify-content: center; margin: 0 auto 20px;
    }

    #pw-input { 
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--color-border-primary);
      background: rgba(0,0,0,0.3); color: white; text-align: center; font-family: var(--font-mono); margin-bottom: 10px;
    }

    /* --- Dashboard مع الأنيميشن الداخلي --- */
    #dashboard { display: none; flex-direction: column; padding: 20px 40px; position: relative; min-height: 100vh; }
    
    .blob {
      position: fixed; top: 0; left: 0; width: 600px; height: 600px;
      background: linear-gradient(135deg, rgba(88, 101, 242, 0.1) 0%, rgba(138, 43, 226, 0.05) 100%);
      filter: blur(100px); border-radius: 50%; z-index: -1; animation: move 25s infinite alternate;
    }

    @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(40%, 40%); } }

    /* --- باقي تنسيقات كودك (تم الحفاظ عليها) --- */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--color-border-primary); margin-bottom: 30px; }
    .topbar-title { font-size: 20px; font-weight: 600; color: white; }
    .count-pill { font-size: 12px; background: var(--color-background-secondary); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--color-border-primary); }

    .search-wrap { position: relative; margin-bottom: 25px; }
    .search-wrap input { width: 100%; padding: 12px 12px 12px 40px; background: var(--color-background-secondary); border: 1px solid var(--color-border-primary); border-radius: 10px; color: white; font-family: var(--font-mono); }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--color-text-secondary); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .project-card { background: var(--color-background-secondary); border: 1px solid var(--color-border-primary); border-radius: 12px; overflow: hidden; transition: 0.2s; }
    .project-card:hover { border-color: var(--primary-accent); transform: translateY(-3px); }
    
    .card-head { padding: 15px; border-bottom: 1px solid var(--color-border-primary); display: flex; justify-content: space-between; align-items: flex-start; }
    .card-name { font-weight: 600; color: white; }
    .lang-tag { font-size: 10px; font-family: var(--font-mono); color: var(--color-border-info); background: var(--color-background-info); padding: 2px 8px; border-radius: 5px; }

    .card-code { background: #010409; max-height: 150px; overflow: hidden; position: relative; padding: 12px; }
    .card-code pre { font-family: var(--font-mono); font-size: 11px; color: #8b949e; }
    .code-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(transparent, #010409); }

    .card-foot { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--color-border-primary); }
    .card-url { font-size: 11px; color: var(--color-border-info); text-decoration: none; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    
    button { cursor: pointer; padding: 8px 16px; border-radius: 8px; border: none; background: var(--primary-accent); color: white; transition: 0.2s; }
    button:hover { opacity: 0.9; }

    /* Modal Styling */
    .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-wrap.open { display: flex; }
    .modal { background: var(--color-background-secondary); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--color-border-primary); }
    .fg { margin-bottom: 15px; }
    .fg label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--color-text-secondary); }
    .fg input, .fg select, .fg textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--color-border-primary); border-radius: 8px; color: white; }
    textarea { min-height: 120px; }

    .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #238636; color: white; padding: 10px 20px; border-radius: 8px; display: none; z-index: 2000; }
  </style>
</head>
<body>

<div id="app">
  <div id="login-screen">
    <div class="vault-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <div id="login-card">
      <h2 style="margin-bottom: 10px;">CodeLib Vault</h2>
      <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 25px;">Welcome back, Nashy!</p>
      <input id="pw-input" type="password" placeholder="Enter Password"/>
      <div id="pw-error" style="color: #f85149; font-size: 12px; margin-bottom: 10px; display: none;">Wrong password.</div>
      <button id="login-btn" onclick="doLogin()" style="width: 100%;">Unlock Vault</button>
    </div>
  </div>

  <div id="dashboard">
    <div class="blob"></div> <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">CodeLib <span style="color: var(--primary-accent);">Vault</span></span>
        <span class="count-pill" id="count-badge">0 projects</span>
      </div>
      <div class="topbar-right">
        <button onclick="openModal()" style="background: #238636;">+ New project</button>
        <button onclick="doLogout()" style="background: transparent; border: 1px solid var(--color-border-primary);">Logout</button>
      </div>
    </div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search your code..." oninput="renderGrid()"/>
    </div>

    <div class="grid" id="projects-grid"></div>
  </div>
</div>

<div class="modal-wrap" id="modal" onclick="handleBackdrop(event)">
  <div class="modal">
    <h3 style="margin-bottom: 20px;" id="modal-title">New Project</h3>
    <div class="fg">
      <label>Project Name</label>
      <input id="f-title" type="text" placeholder="e.g. My Python Script"/>
    </div>
    <div class="fg">
      <label>Language</label>
      <select id="f-lang">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="html">HTML/CSS</option>
        <option value="cpp">C++</option>
      </select>
    </div>
    <div class="fg">
      <label>URL</label>
      <input id="f-url" type="text" placeholder="GitHub link"/>
    </div>
    <div class="fg">
      <label>Code Snippet</label>
      <textarea id="f-code"></textarea>
    </div>
    <div style="text-align: right;">
      <button onclick="closeModal()" style="background: transparent;">Cancel</button>
      <button onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast-msg">Project saved!</div>

<script>
// --- المنطق البرمجي (نفس كودك الأصلي تماماً) ---
const PASSWORD = "nashy";
let projects = JSON.parse(localStorage.getItem('codelib_projects') || '[]');
let editingId = null;

function save(){localStorage.setItem('codelib_projects', JSON.stringify(projects));}

function doLogin(){
  if(document.getElementById('pw-input').value === PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    renderGrid();
  } else {
    document.getElementById('pw-error').style.display='block';
  }
}

function doLogout(){ location.reload(); }

function renderGrid(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = projects.filter(p=>p.title.toLowerCase().includes(q));
  const g = document.getElementById('projects-grid');
  document.getElementById('count-badge').textContent = `${projects.length} projects`;

  if(!filtered.length){
    g.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--color-text-secondary); margin-top: 50px;">No projects found.</p>`;
    return;
  }

  g.innerHTML = filtered.map(p=>`
    <div class="project-card">
      <div class="card-head">
        <div>
          <div class="card-name">${p.title}</div>
          <div style="font-size: 10px; color: var(--color-text-secondary)">${p.date}</div>
        </div>
        <span class="lang-tag">${p.lang}</span>
      </div>
      <div class="card-code">
        <pre>${p.code}</pre>
        <div class="code-fade"></div>
      </div>
      <div class="card-foot">
        <a class="card-url" href="${p.url}" target="_blank">${p.url || 'no link'}</a>
        <button onclick="deleteProject(${p.id})" style="background: #da3633; padding: 5px 10px; font-size: 11px;">Delete</button>
      </div>
    </div>
  `).join('');
}

function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function handleBackdrop(e){ if(e.target.id === 'modal') closeModal(); }

function saveProject(){
  const title=document.getElementById('f-title').value;
  const code=document.getElementById('f-code').value;
  const lang=document.getElementById('f-lang').value;
  const url=document.getElementById('f-url').value;
  
  if(!title || !code) return alert("Fill all fields");

  projects.unshift({id: Date.now(), title, code, lang, url, date: new Date().toLocaleDateString()});
  save(); closeModal(); renderGrid();
}

function deleteProject(id){
  if(confirm("Delete?")){
    projects = projects.filter(p => p.id !== id);
    save(); renderGrid();
  }
}
</script>
</body>
</html>
