<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Code World | Potter Vault Final IDE</title>
    <style>
        :root {
            --gold-color: #d4af37;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --ai-bg: #010409;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            perspective: 1000px;
            cursor: none;
        }

        /* --- 1. شاشة الترحيب السوداء --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1s, visibility 1s;
        }
        .welcome-msg {
            font-size: 28px; color: var(--gold-color);
            text-align: center; font-family: monospace;
            animation: fadeInOut 2.8s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* --- 2. الخلفية والهالة الذهبية (نقطة مصغرة) --- */
        #bg-image {
            position: fixed; inset: -50px;
            background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070');
            background-size: cover; background-position: center;
            z-index: -1; transition: transform 0.2s ease-out;
        }
        
        .cursor-glow {
            position: fixed; width: 180px; height: 180px;
            /* تم تصغير النقطة الذهبية هنا بناءً على طلبك */
            background: radial-gradient(circle, var(--gold-color) 0%, var(--gold-color) 1.5%, rgba(212, 175, 55, 0.1) 8%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            animation: glowPulse 4s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* --- 3. شاشة الدخول --- */
        #login-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        #login-card {
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transition: transform 0.1s ease-out;
        }
        #pw-input { width: 100%; padding: 12px; margin: 20px 0; background: #010409; border: 1px solid #30363d; border-radius: 8px; color: white; text-align: center; }

        /* --- 4. لوحة التحكم --- */
        #dashboard { display: none; padding: 40px 5%; min-height: 100vh; background: rgba(13, 17, 23, 0.9); }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #30363d; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .project-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; transition: transform 0.1s; }
        .history-box { margin-top: 15px; background: #010409; padding: 10px; border-radius: 8px; font-size: 11px; max-height: 100px; overflow-y: auto; border-left: 2px solid var(--gold-color); }
        .history-item { margin-bottom: 5px; color: #8b949e; border-bottom: 1px solid #21262d; padding-bottom: 2px;}

        /* --- 5. Modal & AI Assistant --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10001; }
        .modal-content { background: #161b22; padding: 30px; border-radius: 15px; width: 95%; max-width: 800px; border: 1px solid var(--gold-color); display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: #8b949e; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; background: #010409; border: 1px solid #30363d; border-radius: 6px; color: white; font-family: monospace; }
        textarea { min-height: 200px; resize: vertical; }

        /* AI Side Panel Style */
        #ai-container { background: var(--ai-bg); border: 1px solid #30363d; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; }
        .ai-status { color: var(--gold-color); font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        #ai-output { font-family: monospace; font-size: 12px; line-height: 1.6; color: #8b949e; white-space: pre-wrap; background: #000; padding: 10px; border-radius: 4px; max-height: 150px; overflow-y: auto; }

        button { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--gold-color); color: black; }
        .btn-run { background: #238636; color: white; padding: 5px 15px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="welcome-msg">hello_Eng/potter<br>welcome to again</div>
    </div>

    <div id="bg-image"></div>

    <div id="login-container">
        <div id="login-card">
            <h2>Code World</h2>
            <p style="color: var(--gold-color); font-size: 14px;">Hello_Eng/potter</p>
            <input id="pw-input" type="password" placeholder="Password">
            <button class="btn-gold" onclick="doLogin()" style="width: 100%">Unlock Vault</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <h2 style="color: var(--gold-color);">Code World Vault</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="openModal()" style="background: #238636; color: white;">+ Add Project</button>
                <button onclick="location.reload()" style="background: #da3637; color: white;">Logout</button>
            </div>
        </div>
        <input type="text" id="search-input" class="search-input" style="width:100%; padding:12px; margin:20px 0; background:#010409; border:1px solid #30363d; border-radius:8px; color:white;" placeholder="Search projects..." oninput="renderProjects()">
        <div id="projects-grid" class="grid-layout"></div>
    </div>

    <div id="project-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" style="color: var(--gold-color);">New Project & AI Debugger</h3>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 300px;">
                    <div class="input-group"><label>Project Name</label><input type="text" id="p-name"></div>
                    <div class="input-group" style="margin-top:10px;"><label>Link</label><input type="text" id="p-link"></div>
                    <div class="input-group" style="margin-top:10px;">
                        <label>Source Code (Python/JS)</label>
                        <textarea id="p-code" oninput="aiAutoAnalyze()" placeholder="Write your code here..."></textarea>
                    </div>
                </div>
                <div style="flex: 1; min-width: 250px;">
                    <div id="ai-container">
                        <div class="ai-header">
                            <span class="ai-status">✨ AI Assistant</span>
                            <button class="btn-run" onclick="runCodeSimulation()">▶ Run Code</button>
                        </div>
                        <div id="ai-output">Waiting for code input...</div>
                    </div>
                    <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                        <button class="btn-gold" onclick="saveProject()">Save Project</button>
                        <button onclick="closeModal()" style="background: #30363d; color: white;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const glow = document.createElement('div');
        glow.className = 'cursor-glow';
        document.body.appendChild(glow);

        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            const elements = document.querySelectorAll('#login-card, .project-card');
            elements.forEach(el => { if(el) el.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`; });
            const bg = document.getElementById('bg-image');
            if(bg) bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });

        document.getElementById('pw-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });

        function doLogin() {
            if(document.getElementById('pw-input').value === 'nashy') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                glow.style.display = 'none'; document.body.style.cursor = 'auto';
                renderProjects();
            } else { alert('كلمة المرور غلط يا بطل!'); }
        }

        // --- AI Logic & Code Runner ---
        function aiAutoAnalyze() {
            const output = document.getElementById('ai-output');
            output.innerHTML = "<span style='color: var(--gold-color)'>AI is typing...</span>";
        }

        function runCodeSimulation() {
            const code = document.getElementById('p-code').value;
            const output = document.getElementById('ai-output');
            let logs = [];
            
            if(!code.trim()) { output.innerText = "Empty code. Please write something."; return; }

            // محاكاة تحليل الأخطاء (Jupyter style)
            if (code.includes("if") && !code.includes(":")) logs.push("❌ Syntax Error: Missing ':' at the end of 'if' statement.");
            if ((code.match(/\(/g) || []).length !== (code.match(/\)/g) || []).length) logs.push("❌ Syntax Error: Unclosed parenthesis detected.");
            if (code.includes("print") && !code.includes("(") ) logs.push("❌ Python 3 Error: print function requires ().");

            if(logs.length > 0) {
                output.innerHTML = logs.join("<br>") + "<br><br><span style='color: #f85149'>Suggestion: Fix the errors above.</span>";
            } else {
                output.innerHTML = "<span style='color: #3fb950'>✅ Code analysis: 100% Correct.</span><br><br>Output:<br>----------------<br>Status: Success<br>Result: 0";
            }
        }

        // --- CRUD Logic ---
        let projects = JSON.parse(localStorage.getItem('potter_vault_data')) || [];
        let currentEditId = null;

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            const term = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';
            projects.filter(p => p.name.toLowerCase().includes(term)).forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${p.name}</h3>
                    <a href="${p.link}" target="_blank" style="font-size:12px; color:#58a6ff;">${p.link || 'No Link'}</a>
                    <div class="history-box"><strong>History:</strong>${p.history.map(h => `<div class="history-item">[${h.date}] ${h.action}</div>`).reverse().join('')}</div>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="editProject(${p.id})" style="flex:1; background:#30363d; color:white;">Edit</button>
                        <button onclick="deleteProject(${p.id})" style="background:#da3637; color:white;">Del</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function openModal() { document.getElementById('project-modal').style.display = 'flex'; currentEditId = null; document.getElementById('ai-output').innerText = "Waiting for code..."; }
        function closeModal() { document.getElementById('project-modal').style.display = 'none'; document.getElementById('p-name').value = ''; document.getElementById('p-link').value = ''; document.getElementById('p-code').value = ''; }

        function saveProject() {
            const name = document.getElementById('p-name').value;
            const link = document.getElementById('p-link').value;
            const code = document.getElementById('p-code').value;
            const now = new Date().toLocaleString();
            if(!name) return alert("Name required!");

            if(currentEditId) {
                const p = projects.find(x => x.id === currentEditId);
                p.name = name; p.link = link; p.code = code;
                p.history.push({ date: now, action: "Updated by AI Assistant" });
            } else {
                projects.push({ id: Date.now(), name, link, code, history: [{ date: now, action: "Created" }] });
            }
            localStorage.setItem('potter_vault_data', JSON.stringify(projects));
            closeModal(); renderProjects();
        }

        function editProject(id) {
            const p = projects.find(x => x.id === id);
            currentEditId = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-link').value = p.link;
            document.getElementById('p-code').value = p.code;
            document.getElementById('project-modal').style.display = 'flex';
        }

        function deleteProject(id) {
            if(confirm("Are you sure?")) { projects = projects.filter(p => p.id !== id); localStorage.setItem('potter_vault_data', JSON.stringify(projects)); renderProjects(); }
        }

        window.onload = () => { setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.visibility = 'hidden', 1000); }, 3000); };
    </script>
</body>
</html>
