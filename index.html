<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code World | Potter Master Vault</title>
    
    <style>
        :root {
            --gold-color: #d4af37;
            --bg-dark: #080a0f;
            --text-main: #c9d1d9;
            --font-fancy: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-fancy);
            overflow: hidden;
            cursor: none; /* إخفاء الماوس الأصلي */
        }

        /* --- 1. شاشة ترحيب فخمة (Splash Screen) --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-text {
            font-size: 5rem;
            font-weight: 900;
            color: var(--gold-color);
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            line-height: 1.2;
            /* تأثير 3D احترافي */
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 
                0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 
                0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 
                0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15),
                0 0 30px var(--gold-color);
            animation: emerge 2.5s ease-out forwards;
        }

        @keyframes emerge {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        /* --- 2. الماوس الذهبي المطور --- */
        #dot {
            width: 6px;
            height: 6px;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--gold-color);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10002;
            transform: translate(-50%, -50%);
        }

        #halo {
            width: 45px;
            height: 45px;
            border: 1.5px solid var(--gold-color);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- 3. خلفية برمجية "تتنفس" (Parallax) --- */
        #bg-container {
    position: fixed;
    inset: -10%; /* عشان حركة البارالاكس تكون واسعة ومريحة */
    /* الصورة دي اخترتها لك بعناية: مكتب مبرمج كود هادي */
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=2072') center/cover;
    z-index: -1;
    will-change: transform;
}

        /* --- 4. شاشة الدخول --- */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .login-card {
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            animation: floating 5s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        .brand-logo {
            margin-bottom: 40px;
            animation: sideToSide 4s infinite ease-in-out;
        }

        .brand-logo h1 {
            color: #fff;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .brand-logo p {
            color: var(--gold-color);
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            letter-spacing: 4px;
            font-weight: bold;
        }

        @keyframes sideToSide {
            0%, 100% { transform: translateX(-15px); }
            50% { transform: translateX(15px); }
        }

        /* مدخل الباسورد */
        #pw-input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
            transition: 0.4s;
        }

        #pw-input:focus {
            border-color: var(--gold-color);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            outline: none;
        }

        .btn-gold {
            background: var(--gold-color);
            color: #000;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            border: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .btn-gold:hover {
            transform: scale(1.03) translateY(-3px);
            background: #fff;
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }

        /* إخفاء الأقسام الداخلية في البداية */
        #dashboard, #ide-screen { display: none; }

    </style>
</head>
<body>

    <!-- 1. شاشة الترحيب -->
    <div id="splash-screen">
        <div class="welcome-text">HELLO<br>ENG_POTTER</div>
    </div>

    <!-- 2. الماوس المضيء -->
    <div id="dot"></div>
    <div id="halo"></div>

    <!-- 3. الخلفية المتحركة -->
    <div id="bg-container"></div>

    <!-- 4. واجهة الدخول -->
    <section id="login-screen">
        <div class="login-card">
            <div class="brand-logo">
                <h1>World_Code</h1>
                <p>Eng/Potter</p>
            </div>
            <input id="pw-input" type="password" placeholder="••••••••">
            <button class="btn-gold" onclick="validateIdentity()">Unlock Master Vault</button>
        </div>
    </section>

    <!-- 5. المحتوى الداخلي (المخزن) -->
    <main id="dashboard" style="padding: 100px; text-align: center;">
        <h1 style="color: var(--gold-color); font-size: 3rem;">Access Granted</h1>
        <p style="margin-top: 20px;">Welcome back, Master Potter.</p>
        <button onclick="location.reload()" style="margin-top: 50px; background: none; border: 1px solid red; color: red; padding: 10px 20px; cursor: pointer; border-radius: 10px;">Security Logout</button>
    </main>

    <script>
        // --- التحكم في الماوس والحركة ---
        const dot = document.getElementById('dot');
        const halo = document.getElementById('halo');
        const bg = document.getElementById('bg-container');

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // تحريك الماوس النقطة والهالة
            dot.style.left = `${x}px`;
            dot.style.top = `${y}px`;
            
            // حركة الهالة مع تأخير بسيط لسلاسة أكثر
            setTimeout(() => {
                halo.style.left = `${x}px`;
                halo.style.top = `${y}px`;
            }, 50);

            // تأثير البارالاكس (الخلفية تتحرك عكس الماوس)
            const moveX = (window.innerWidth / 2 - x) / 40;
            const moveY = (window.innerHeight / 2 - y) / 40;
            bg.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
        });

        // --- تلاشي شاشة الترحيب ---
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 1200);
            }, 3500); // 3.5 ثانية للترحيب
        };

        // --- التحقق من الهوية ---
        function validateIdentity() {
            const pass = document.getElementById('pw-input').value;
            if (pass === 'nashy') {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    // إعادة الماوس للشكل الطبيعي داخل لوحة التحكم
                    document.body.style.cursor = 'default';
                    dot.style.display = 'none';
                    halo.style.display = 'none';
                }, 500);
            } else {
                alert("IDENTITY UNVERIFIED: Access Denied.");
            }
        }

        // تفعيل زر Enter للدخول
        document.getElementById('pw-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') validateIdentity();
        });
    </script>
</body>
</html>
