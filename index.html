<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Code World | Breathing Vault</title>
  <style>
    :root {
      --gold-color: #d4af37;
      --bg-dark: #0d1117;
    }

    body, html {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background-color: var(--bg-dark);
      overflow: hidden;
      perspective: 1000px; /* ضروري جداً لإعطاء بعد ثالث للحركة */
    }

    /* --- شاشة الترحيب --- */
    #splash {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: 1s;
    }

    /* --- الخلفية اللي بتتنفس (The Breathing Background) --- */
    .breathing-bg {
      position: fixed;
      inset: -50px; /* أكبر من الشاشة شوية عشان لما تتحرك متسيبش فراغ */
      background: radial-gradient(circle at center, #1a1a2e 0%, #0d1117 100%);
      z-index: -1;
      transition: transform 0.2s ease-out; /* نعومة الحركة مع الماوس */
    }

    /* تأثير النبض التلقائي (Pulse) */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .breathing-bg::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.05), transparent);
      animation: pulse 8s infinite ease-in-out;
    }

    /* --- كارت الدخول المتفاعل --- */
    #login-container {
      height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    .glass-card {
      background: rgba(22, 27, 34, 0.8);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px; border-radius: 25px;
      text-align: center; width: 350px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      /* هذا السطر هو سر التنفس مع الماوس */
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    .gold-text {
      color: var(--gold-color);
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    input {
      width: 100%; padding: 12px; margin: 20px 0;
      background: #010409; border: 1px solid #30363d;
      border-radius: 8px; color: white; text-align: center;
    }

    /* أنيميشن الماوس (التوهج) */
    .glow {
      position: fixed; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
      z-index: 99;
    }
  </style>
</head>
<body>

<div id="splash">
  <h1 class="gold-text" style="animation: pulse 2s infinite">hello_Eng/potter...</h1>
</div>

<div class="breathing-bg" id="bg"></div>
<div class="glow" id="glow"></div>

<div id="login-container">
  <div class="glass-card" id="card">
    <h2 style="color: white;">Code World</h2>
    <p class="gold-text">Welcome Back Potter</p>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="check()" style="background:var(--gold-color); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">Unlock</button>
  </div>
</div>

<script>
  const bg = document.getElementById('bg');
  const card = document.getElementById('card');
  const glow = document.getElementById('glow');

  // --- كود التنفس والحركة مع الماوس ---
  window.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 40; // نسبة الحركة أفقياً
    const y = (e.clientY / window.innerHeight - 0.5) * 40; // نسبة الحركة رأسياً

    // تحريك الخلفية (عكس الماوس عشان تدي عمق)
    bg.style.transform = `translate(${-x}px, ${-y}px)`;

    // إمالة الكارت (Tilt Effect)
    card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;

    // تحريك التوهج الذهبي مع الماوس
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  // كود الباسورد والـ Enter
  document.getElementById('pass').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') check();
  });

  function check() {
    if(document.getElementById('pass').value === 'nashy') {
      alert('Welcome, Master Potter!');
      // هنا تقدر تفتح الـ Dashboard بتاعتك
    } else {
      alert('Wrong Password!');
    }
  }

  // إخفاء شاشة الترحيب
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('splash').style.opacity = '0';
      setTimeout(() => document.getElementById('splash').remove(), 1000);
    }, 2500);
  };
</script>

</body>
</html>
