<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code World Vault</title>
  <style>
    :root {
      --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', monospace;
      --bg-dashboard: #0d1117; /* لون الخلفية الداخلي */
      --card-bg: #161b22;      /* لون كارت المشروع */
      --gold-color: #d4af37;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: #0d1117;
      color: #c9d1d9;
      overflow-x: hidden;
    }

    /* --- شاشة الدخول (التي بها الصورة) --- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      position: fixed;
      width: 100%;
      z-index: 1000;
    }

    #login-card {
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #login-card h2 { font-size: 24px; margin-bottom: 5px; }
    
    .subtitle {
      font-size: 15px;
      font-weight: 300;
      color: var(--gold-color);
      margin-bottom: 25px;
      background: linear-gradient(90deg, #d4af37 0%, #ffffff 50%, #d4af37 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }
    @keyframes shine { to { background-position: -200% center; } }

    #pw-input {
      width: 100%;
      padding: 10px;
      background: #010409;
      border: 1px solid #30363d;
      color: white;
      text-align: center;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    /* --- لوحة التحكم (الخلفية الداكنة السادة) --- */
    #dashboard {
      display: none; /* تظهر فقط بعد تسجيل الدخول */
      background: var(--bg-dashboard);
      min-height: 100vh;
      padding: 20px 5%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #30363d;
      margin-bottom: 30px;
    }

    /* كروت المشاريع - غير شفافة وواضحة جداً */
    .project-card {
      background: var(--card-bg);
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card-head { padding: 15px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; }
    .card-name { font-weight: 600; color: #f0f6fc; }

    .card-code {
      background: #010409 !important; /* لون أسود عميق للكود */
      padding: 15px;
      border-top: 1px solid #30363d;
      border-bottom: 1px solid #30363d;
    }
    .card-code pre { color: #79c0ff; font-family: var(--font-mono); font-size: 13px; overflow-x: auto; }

    .card-foot { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }

    button {
      background: #238636;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #2ea043; }

    .search-wrap input {
      width: 100%;
      padding: 12px;
      background: #010409;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: white;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div id="login-card">
      <h2>Code World</h2>
      <p class="subtitle">Hello_Eng/potter</p>
      <input id="pw-input" type="password" placeholder="Password">
      <button onclick="doLogin()" style="width: 100%">Unlock Vault</button>
      <p id="error" style="color: #f85149; font-size: 12px; margin-top: 10px; display: none;">Wrong password!</p>
    </div>
  </div>

  <div id="dashboard">
    <div class="topbar">
      <h2>Code World Vault</h2>
      <div>
        <button onclick="alert('Open Modal to add project')">+ New Project</button>
        <button onclick="location.reload()" style="background: #da3637; margin-right: 10px;">Logout</button>
      </div>
    </div>

    <div class="search-wrap">
      <input type="text" placeholder="Search projects...">
    </div>

    <div id="projects-grid">
      <div class="project-card">
        <div class="card-head">
          <span class="card-name">My First Script</span>
          <span style="color: #58a6ff; font-size: 12px;">Python</span>
        </div>
        <div class="card-code">
          <pre><code>print("Hello Eng Potter!")
# Now the code is 100% readable</code></pre>
        </div>
        <div class="card-foot">
          <span style="font-size: 11px; color: #8b949e;">2026-04-30</span>
          <button style="background: #30363d">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function doLogin() {
      const pass = document.getElementById('pw-input').value;
      if(pass === 'nashy') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.body.style.backgroundImage = 'none'; // حذف خلفية اللاب توب عند الدخول
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
