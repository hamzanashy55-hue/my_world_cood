<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Code World | Potter Vault v2</title>
    <style>
        :root {
            --gold-color: #d4af37;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            perspective: 1000px;
            cursor: none;
        }

        /* --- 1. شاشة الترحيب --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1s, visibility 1s;
        }
        .welcome-msg {
            font-size: 28px; color: var(--gold-color);
            text-align: center; font-family: monospace;
            animation: fadeInOut 2.8s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* --- 2. الخلفية والماوس --- */
        #bg-image {
            position: fixed; inset: -50px;
            background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070');
            background-size: cover; background-position: center;
            z-index: -1; transition: transform 0.2s ease-out;
        }
        .cursor-glow {
            position: fixed; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
        }
        .trail-dot {
            position: fixed; width: 8px; height: 8px;
            background: var(--gold-color); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            filter: drop-shadow(0 0 5px var(--gold-color));
        }

        /* --- 3. شاشة الدخول --- */
        #login-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        #login-card {
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transition: transform 0.1s ease-out;
        }
        #pw-input {
            width: 100%; padding: 12px; margin: 20px 0;
            background: #010409; border: 1px solid #30363d;
            border-radius: 8px; color: white; text-align: center;
        }

        /* --- 4. لوحة التحكم (الداخلية) --- */
        #dashboard {
            display: none; padding: 40px 5%;
            min-height: 100vh; background: rgba(13, 17, 23, 0.8);
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid #30363d;
        }
        .search-input {
            width: 100%; padding: 12px; background: #010409;
            border: 1px solid #30363d; color: white; border-radius: 8px; margin: 20px 0;
        }
        .grid-layout {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }
        .project-card {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 20px;
        }
        .history-box {
            margin-top: 15px; background: #010409; padding: 10px;
            border-radius: 8px; font-size: 11px; max-height: 100px;
            overflow-y: auto; border-left: 2px solid var(--gold-color);
        }
        .history-item { margin-bottom: 5px; color: #8b949e; border-bottom: 1px solid #21262d; }

        /* --- 5. Modal (نافذة الإضافة) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 10001;
        }
        .modal-content {
            background: #161b22; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 500px; border: 1px solid var(--gold-color);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #8b949e; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 10px; background: #010409; border: 1px solid #30363d;
            border-radius: 6px; color: white;
        }
        textarea { min-height: 120px; font-family: monospace; }

        button {
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            border: none; font-weight: bold; transition: 0.3s;
        }
        .btn-gold { background: var(--gold-color); color: black; }
        .btn-gold:hover { background: #fff; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="welcome-msg">hello_Eng/potter<br>welcome to again</div>
    </div>

    <div id="bg-image"></div>
    <div id="glow" class="cursor-glow"></div>

    <div id="login-container">
        <div id="login-card">
            <h2 style="color: white; margin-bottom: 10px;">Code World</h2>
            <p style="color: var(--gold-color); font-size: 14px;">Hello_Eng/potter</p>
            <input id="pw-input" type="password" placeholder="Password">
            <button class="btn-gold" onclick="doLogin()" style="width: 100%">Unlock Vault</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <h2 style="color: var(--gold-color);">Code World Vault</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="openModal()" style="background: #238636; color: white;">+ Add Project</button>
                <button onclick="location.reload()" style="background: #da3637; color: white;">Logout</button>
            </div>
        </div>

        <input type="text" id="search-input" class="search-input" placeholder="Search by project name..." oninput="renderProjects()">
        <div id="projects-grid" class="grid-layout"></div>
    </div>

    <div id="project-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 20px; color: var(--gold-color);">Add New Project</h3>
            <div class="input-group"><label>Project Name</label><input type="text" id="p-name"></div>
            <div class="input-group"><label>Project Link</label><input type="text" id="p-link"></div>
            <div class="input-group"><label>Source Code</label><textarea id="p-code"></textarea></div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeModal()" style="background: #30363d; color: white;">Cancel</button>
                <button class="btn-gold" onclick="saveProject()">Save Project</button>
            </div>
        </div>
    </div>

    <script>
        // 1. الدخول والأنيميشن
        const bg = document.getElementById('bg-image');
        const card = document.getElementById('login-card');
        const glow = document.getElementById('glow');

        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            card.style.transform = `rotateY(${x/2}deg) rotateX(${-y/2}deg)`;
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        const dots = [];
        for(let i=0; i<10; i++) {
            const d = document.createElement('div');
            d.className = 'trail-dot';
            document.body.appendChild(d);
            dots.push(d);
        }
        let mx = 0, my = 0;
        window.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });

        function animateDots() {
            let x = mx, y = my;
            dots.forEach((d, i) => {
                d.style.left = x + 'px'; d.style.top = y + 'px';
                d.style.opacity = 1 - (i / dots.length);
                let next = dots[i+1] || dots[0];
                x += (next.offsetLeft - x) * 0.3; y += (next.offsetTop - y) * 0.3;
            });
            requestAnimationFrame(animateDots);
        }
        animateDots();

        document.getElementById('pw-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        function doLogin() {
            if(document.getElementById('pw-input').value === 'nashy') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.body.style.cursor = 'auto'; // إرجاع الماوس للتعامل مع الداتا
                renderProjects();
            } else { alert('Wrong password!'); }
        }

        // 2. إدارة المشاريع والـ History
        let projects = JSON.parse(localStorage.getItem('potter_vault_data')) || [];
        let currentEditId = null;

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            projects.filter(p => p.name.toLowerCase().includes(searchTerm)).forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${p.name}</h3>
                    <a href="${p.link}" target="_blank" style="font-size:12px; color:#58a6ff; text-decoration:none;">${p.link || 'No Link'}</a>
                    <div class="history-box">
                        <strong style="color:var(--gold-color)">History:</strong>
                        ${p.history.map(h => `<div class="history-item">[${h.date}] ${h.action}</div>`).reverse().join('')}
                    </div>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="editProject(${p.id})" style="flex:1; background:#30363d; color:white;">Edit</button>
                        <button onclick="deleteProject(${p.id})" style="background:#da3637; color:white;">Delete</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal() { document.getElementById('project-modal').style.display = 'flex'; currentEditId = null; }
        function closeModal() { document.getElementById('project-modal').style.display = 'none'; }

        function saveProject() {
            const name = document.getElementById('p-name').value;
            const link = document.getElementById('p-link').value;
            const code = document.getElementById('p-code').value;
            const now = new Date().toLocaleString();

            if (!name) return alert("Name is required!");

            if (currentEditId) {
                const p = projects.find(x => x.id === currentEditId);
                p.name = name; p.link = link; p.code = code;
                p.history.push({ date: now, action: "Updated" });
            } else {
                projects.push({ id: Date.now(), name, link, code, history: [{ date: now, action: "Created" }] });
            }

            localStorage.setItem('potter_vault_data', JSON.stringify(projects));
            closeModal(); renderProjects();
        }

        function editProject(id) {
            const p = projects.find(x => x.id === id);
            currentEditId = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-link').value = p.link;
            document.getElementById('p-code').value = p.code;
            document.getElementById('project-modal').style.display = 'flex';
        }

        function deleteProject(id) {
            if(confirm("Delete this project?")) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('potter_vault_data', JSON.stringify(projects));
                renderProjects();
            }
        }

        window.onload = () => {
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                s.style.opacity = '0';
                setTimeout(() => s.style.visibility = 'hidden', 1000);
            }, 3000);
        };
    </script>
</body>
</html>
