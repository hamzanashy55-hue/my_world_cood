<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code World | Potter Master Vault</title>
    
    <style>
        /* --- 1. الـ Variables والأساسيات --- */
        :root {
            --gold-color: #d4af37;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --error-red: #f85149;
            --success-green: #3fb950;
            --border-gray: #30363d;
            --editor-blue: #79c0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            perspective: 1000px;
            cursor: none; /* إخفاء الماوس الأصلي */
        }

        /* --- 2. الماوس الذهبي المصغر (نظام النبض) --- */
        .cursor-glow {
            position: fixed;
            width: 180px;
            height: 180px;
            background: radial-gradient(
                circle, 
                var(--gold-color) 0%, 
                var(--gold-color) 1.5%, 
                rgba(212, 175, 55, 0.1) 10%, 
                transparent 70%
            );
            border-radius: 50%;
            pointer-events: none;
            z-index: 10005;
            transform: translate(-50%, -50%);
            will-change: left, top;
            animation: glowPulse 4s infinite ease-in-out;
        }
        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* --- 3. شاشة الترحيب (الرسالة الأصلية) --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10001; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .welcome-msg {
            font-size: 28px;
            color: var(--gold-color);
            text-align: center;
            font-family: 'Courier New', monospace;
            animation: fadeInOut 2.8s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* --- 4. شاشة الدخول والخلفية --- */
        #bg-image {
            position: fixed; inset: -60px;
            background: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070') center/cover;
            z-index: -1; will-change: transform; transition: transform 0.3s ease-out;
        }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            background: rgba(13, 17, 23, 0.95);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid var(--gold-color);
            text-align: center;
            backdrop-filter: blur(15px);
            width: 400px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        /* --- 5. لوحة التحكم (الخزنة الدائمة) --- */
        #dashboard {
            display: none;
            padding: 50px 7%;
            height: 100vh;
            overflow-y: auto;
            background: rgba(13, 17, 23, 0.9);
        }
        .db-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .project-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-gray);
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }
        .project-card:hover { transform: translateY(-10px); border-color: var(--gold-color); }

        /* --- 6. بيئة التطوير IDE (كود يسار | عرض يمين) --- */
        #ide-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #010409;
        }
        .ide-header {
            background: #161b22;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gray);
        }
        .ide-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row-reverse; /* الكود يسار والعرض يمين */
        }
        
        /* القسم الأيسر: محرر الكود والمساعد */
        #editor-part {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-gray);
            padding: 25px;
            background: #0d1117;
            position: relative;
        }
        #code-editor {
            flex: 1;
            background: #010409;
            color: var(--editor-blue);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            font-family: 'Cascadia Code', monospace;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            direction: ltr;
        }

        /* المساعد الذكي AI (فوق يسار) */
        #ai-assistant-box {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold-color);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            color: var(--gold-color);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        /* القسم الأيمن: العرض الحي */
        #preview-part {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .phone-frame {
            width: 320px; height: 580px;
            background: #222; border: 14px solid #333;
            border-radius: 40px; overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .laptop-frame { width: 100% !important; height: 100% !important; border-radius: 0; border: none; }
        iframe { width: 100%; height: 100%; background: #fff; border: none; pointer-events: auto; }

        /* نافذة الاختيار (Choice Modal) */
        #choice-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 10010; }
        .choice-box { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 2px solid var(--gold-color); text-align: center; width: 420px; }

        /* الأزرار */
        button { cursor: pointer; border-radius: 10px; border: none; padding: 12px 25px; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-gold { background: var(--gold-color); color: #000; }
        .btn-gold:hover { background: #fff; transform: translateY(-2px); }
        .btn-open { background: var(--success-green); color: #fff; width: 100%; margin-top: 15px; }
        .btn-delete { background: transparent; color: var(--error-red); font-size: 11px; margin-top: 15px; border: 1px solid transparent; }
        .btn-delete:hover { border-color: var(--error-red); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="welcome-msg">hello_Eng/potter<br>welcome to again</div>
    </div>

    <div class="cursor-glow" id="mouse-cursor"></div>

    <div id="bg-image"></div>

    <section id="login-screen">
        <div class="login-card">
            <h2 style="color:#fff;">Potter Vault Access</h2>
            <p style="color:var(--gold-color); font-size:14px; margin-top:10px;">Master Identity: Eng/Potter</p>
            <input id="pw-input" type="password" placeholder="Enter Vault Password">
            <button class="btn-gold" onclick="validateIdentity()" style="width: 100%">Unlock Potter Vault</button>
        </div>
    </section>

    <main id="dashboard">
        <div class="db-header">
            <div>
                <h1 style="color:var(--gold-color);">System Repository</h1>
                <p style="color:#555; font-size:12px;">Manage your persistent code systems</p>
            </div>
            <div style="display:flex; gap:15px;">
                <button onclick="createNewProject()" class="btn-gold">+ Add New System</button>
                <button onclick="location.reload()" style="background:#da3637; color:#fff;">Logout</button>
            </div>
        </div>
        <div id="projects-grid" class="grid-layout">
            </div>
    </main>

    <div id="choice-modal">
        <div class="choice-box">
            <h2 style="color:var(--gold-color); margin-bottom:20px;">Environment Setup</h2>
            <p style="color:#8b949e; margin-bottom:30px;">How would you like to initialize this project?</p>
            <div style="display:flex; gap:20px; justify-content:center;">
                <div onclick="launchStudio('phone')" style="cursor:pointer; background:#0d1117; padding:25px; border-radius:20px; border:1px solid #333; flex:1;">
                    <span style="font-size:35px;">📱</span><br><br><b>Phone View</b>
                </div>
                <div onclick="launchStudio('laptop')" style="cursor:pointer; background:#0d1117; padding:25px; border-radius:20px; border:1px solid #333; flex:1;">
                    <span style="font-size:35px;">💻</span><br><br><b>Laptop View</b>
                </div>
            </div>
            <button onclick="closeChoiceModal()" style="margin-top:30px; background:transparent; color:#555;">Cancel Operation</button>
        </div>
    </div>

    <section id="ide-screen">
        <header class="ide-header">
            <button onclick="saveAndExitStudio()" style="background:#30363d; color:#fff;">← Save & Terminal</button>
            <h3 id="studio-title" style="color:var(--gold-color);">System Editor</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="toggleLogPanel()" style="background:#161b22; color:#fff; border:1px solid #333;">📜 View History</button>
                <button onclick="forceSync()" class="btn-gold">Manual Sync</button>
            </div>
        </header>

        <div id="history-panel" style="display:none; background:#0d1117; padding:20px; border-bottom:1px solid #333; max-height:200px; overflow-y:auto;"></div>

        <div class="ide-body">
            <div id="preview-part">
                <div id="device-wrapper" class="phone-frame">
                    <iframe id="render-viewport"></iframe>
                </div>
            </div>

            <div id="editor-part">
                <div id="ai-assistant-box">✨ AI Engine: System Nominal - Listening...</div>
                
                <div style="margin-bottom:20px;">
                    <label style="font-size:11px; color:var(--gold-color); display:block; margin-bottom:5px;">System Identifier</label>
                    <input type="text" id="studio-name-input" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
                </div>
                
                <div style="margin-bottom:20px;">
                    <label style="font-size:11px; color:var(--gold-color); display:block; margin-bottom:5px;">External System Link</label>
                    <input type="text" id="studio-link-input" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;" placeholder="https://...">
                </div>

                <label style="font-size:11px; color:var(--gold-color); display:block; margin-bottom:5px;">Source Code Core</label>
                <textarea id="code-editor" oninput="compileRealTime()" placeholder="// Initiate logic, Potter..."></textarea>
            </div>
        </div>
    </section>

    <script>
        /**
         * Potter Core Logic Engine
         * Handles persistence, AI simulation, and UI flow.
         */

        // --- 1. نظام الماوس والتحسين ---
        const cursor = document.getElementById('mouse-cursor');
        const bg = document.getElementById('bg-image');

        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Parallax Effect
            const moveX = (window.innerWidth / 2 - e.clientX) / 80;
            const moveY = (window.innerHeight / 2 - e.clientY) / 80;
            bg.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });

        // --- 2. نظام الدخول بالـ Enter ---
        document.getElementById('pw-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') validateIdentity();
        });

        // --- 3. نظام قاعدة البيانات المحلية (LocalStorage) ---
        let vaultData = JSON.parse(localStorage.getItem('potter_master_vault')) || [];
        let currentTargetIndex = null;

        /**
         * التحقق من الهوية
         */
        function validateIdentity() {
            if (document.getElementById('pw-input').value === 'nashy') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.body.style.cursor = 'auto';
                cursor.style.display = 'none';
                refreshDashboard();
            } else {
                alert("ACCESS DENIED: Unauthorized Identity.");
            }
        }

        /**
         * تحديث الداشبورد
         */
        function refreshDashboard() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            vaultData.forEach((proj, idx) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${proj.name}</h3>
                    <p style="font-size:10px; color:#555;">STAMP: ${proj.updated || 'NEW'}</p>
                    <button class="btn-open" onclick="openChoiceModal(${idx})">OPEN VAULT</button>
                    <button class="btn-delete" onclick="deleteSystem(${idx})">PURGE SYSTEM</button>
                `;
                grid.appendChild(card);
            });
        }

        /**
         * نظام الـ IDE والتشغيل المباشر
         */
        function openChoiceModal(idx) {
            currentTargetIndex = idx;
            document.getElementById('choice-modal').style.display = 'flex';
        }

        function closeChoiceModal() {
            document.getElementById('choice-modal').style.display = 'none';
        }

        function launchStudio(mode) {
            const project = vaultData[currentTargetIndex];
            document.getElementById('choice-modal').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('ide-screen').style.display = 'flex';
            
            // تعبئة البيانات
            document.getElementById('studio-name-input').value = project.name;
            document.getElementById('studio-link-input').value = project.link || '';
            document.getElementById('code-editor').value = project.code || '<h1>Ready, Potter?</h1>';
            
            // ضبط الجهاز
            const wrapper = document.getElementById('device-wrapper');
            wrapper.className = (mode === 'laptop') ? 'laptop-frame' : 'phone-frame';
            
            compileRealTime();
        }

        /**
         * المترجم المباشر وذكاء الـ AI
         */
        function compileRealTime() {
            const code = document.getElementById('code-editor').value;
            const link = document.getElementById('studio-link-input').value;
            const iframe = document.getElementById('render-viewport');
            
            // العرض: إذا كان هناك لينك، افتحه، وإلا اعرض الكود
            if (link.trim() !== "") {
                iframe.src = link;
            } else {
                iframe.srcdoc = code;
            }

            // --- AI Analysis Logic ---
            const ai = document.getElementById('ai-assistant-box');
            let status = "✨ AI Engine: <span style='color:var(--success-green)'>Logic 100% Valid.</span>";
            
            if (code.includes('if') && !code.includes(':')) {
                status = "✨ AI Engine: <span style='color:var(--error-red)'>ERROR: Missing ':' in condition.</span>";
            } else if ((code.match(/\(/g) || []).length !== (code.match(/\)/g) || []).length) {
                status = "✨ AI Engine: <span style='color:var(--error-red)'>WARNING: Unclosed brackets detected.</span>";
            }

            ai.innerHTML = status;
        }

        /**
         * الحفظ النهائي وتاريخ التعديلات
         */
        function saveAndExitStudio() {
            const p = vaultData[currentTargetIndex];
            const oldCode = p.code || "";
            const newCode = document.getElementById('code-editor').value;
            
            // تسجيل الهيستوري
            if (!p.history) p.history = [];
            if (oldCode !== newCode) {
                p.history.push({
                    date: new Date().toLocaleString(),
                    old: oldCode.substring(0, 30) + "...",
                    new: newCode.substring(0, 30) + "..."
                });
            }

            p.name = document.getElementById('studio-name-input').value;
            p.link = document.getElementById('studio-link-input').value;
            p.code = newCode;
            p.updated = new Date().toLocaleString();

            syncVault();
            document.getElementById('ide-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refreshDashboard();
        }

        function toggleLogPanel() {
            const panel = document.getElementById('history-panel');
            if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            const logs = vaultData[currentTargetIndex].history || [];
            panel.innerHTML = logs.map(l => `
                <div style="font-size:11px; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">
                    <b style="color:var(--gold-color)">[${l.date}]</b> 
                    <span style="color:var(--error-red)">OLD: ${l.old}</span> | 
                    <span style="color:var(--success-green)">NEW: ${l.new}</span>
                </div>
            `).reverse().join('');
        }

        function syncVault() {
            localStorage.setItem('potter_master_vault', JSON.stringify(vaultData));
        }

        function createNewProject() {
            const name = prompt("Project Identifier:");
            if (name) {
                vaultData.push({ name: name, code: '', history: [], updated: new Date().toLocaleString() });
                syncVault();
                refreshDashboard();
            }
        }

        function deleteSystem(idx) {
            if (confirm("Confirm Permanent Deletion Protocol?")) {
                vaultData.splice(idx, 1);
                syncVault();
                refreshDashboard();
            }
        }

        function forceSync() { syncVault(); alert("Manual Sync Completed."); }

        // إخفاء شاشة الترحيب
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.visibility = 'hidden', 1000);
                }
            }, 3000);
        };
    </script>
</body>
</html>
